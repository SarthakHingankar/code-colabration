services:

  redis:
    image: redis:7
    container_name: redis-server
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: sandbox
    ports:
      - "5432:5432"

  worker:
    build: ./worker
    container_name: execution-worker
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  gateway:
    build: ./gateway
    container_name: realtime-gateway
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    depends_on:
      - redis
