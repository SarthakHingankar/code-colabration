services:

  redis:
    image: redis:7
    container_name: redis-server
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: sandbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  worker:
    build: ./worker
    container_name: execution-worker
    environment:
      - REDIS_URL=redis://redis:6379
      - EXECUTION_IMAGE=code-colabration-execution-image:latest
      - DOCKER_BIN=docker
      # Optional: if your Docker engine is exposed over TCP (common on Docker Desktop), set this.
      # Example: DOCKER_HOST=tcp://host.docker.internal:2375
      - DOCKER_HOST=${DOCKER_HOST}
    depends_on:
      - redis
      - execution-image
    volumes:
      # Allow worker to control Docker engine for container-per-execution.
      # Works on Linux. On Docker Desktop (Windows/Mac), the socket path differs and this may need adjustment.
      - /var/run/docker.sock:/var/run/docker.sock
      # Share tmp jobs directory with the Docker host so it can be mounted into execution containers.
      - ./tmp:/app/tmp

  nginx:
    image: nginx:1.27-alpine
    container_name: collab-nginx
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway

  gateway:
    build: ./gateway
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://dev:dev@postgres:5432/sandbox
      REDIS_URL: redis://redis:6379
      PORT: 3000
    depends_on:
      - redis
      - postgres
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run start"

  # Build-only image used for sandboxed execution.
  # (No container needs to run for this service; it exists so `compose build` produces the image.)
  execution-image:
    build: ./execution-image
    image: code-colabration-execution-image:latest

volumes:
  postgres_data:


